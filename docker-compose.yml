version: "3.9"

services:
  db:
    image: postgres:15
    container_name: aureus-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aureus
      POSTGRES_USER: aureus
      POSTGRES_PASSWORD: aureus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

